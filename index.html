<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f2540">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Öncü Rapor">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Öncü Rapor</title>
<style>
:root {
  --navy: #0f2540;
  --navy2: #1a3a5c;
  --navy3: #234d78;
  --green: #25d366;
  --safe: #1d9e75;
  --danger: #e04040;
  --amber: #e8a020;
  --bg: #f0ede8;
  --card: #ffffff;
  --muted: #8496a9;
  --border: #e2ddd7;
  --text: #1a2a3a;
  --safe-area-top: env(safe-area-inset-top, 0px);
  --safe-area-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}
/* ── LAYOUT ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
}
.header {
  background: var(--navy);
  padding: var(--safe-area-top) 0 0;
  flex-shrink: 0;
  z-index: 10;
}
.header-inner {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px 14px;
}
.header-logo {
  width: 38px; height: 38px;
  border-radius: 9px;
  background: #fff;
  object-fit: contain;
  padding: 2px;
  flex-shrink: 0;
}
.header-logo-fallback {
  width: 38px; height: 38px;
  border-radius: 9px;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 900; color: var(--navy);
  flex-shrink: 0;
}
.header-text h1 { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
.header-text p  { font-size: 11px; color: #7ab8e8; margin-top: 1px; }

.screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.screen.on { display: flex; }

/* ── HOME ── */
.home-top {
  background: var(--navy);
  padding: 0 16px 16px;
}
.add-row {
  background: rgba(255,255,255,0.10);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 10px 10px 14px;
}
.add-inp {
  flex: 1;
  background: transparent;
  border: none;
  font-size: 15px;
  color: #fff;
  font-family: inherit;
  outline: none;
  min-width: 0;
}
.add-inp::placeholder { color: rgba(255,255,255,0.35); }
.btn-add {
  background: var(--green);
  border: none;
  border-radius: 10px;
  padding: 9px 16px;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  flex-shrink: 0;
  min-height: 44px;
}
.home-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 16px;
  padding-bottom: calc(var(--safe-area-bottom) + 16px);
}
.section-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.section-label { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.6px; text-transform: uppercase; }
.count-pill { background: var(--navy); color: #7ab8e8; font-size: 11px; font-weight: 700; border-radius: 20px; padding: 3px 9px; }
.empty-state {
  text-align: center;
  padding: 52px 24px;
  color: var(--muted);
}
.empty-state .icon { font-size: 42px; margin-bottom: 12px; opacity: 0.4; }
.empty-state p { font-size: 15px; line-height: 1.5; }

.cust-card {
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border);
  margin-bottom: 10px;
  overflow: hidden;
}
.cust-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px;
  cursor: pointer;
  min-height: 68px;
}
.cust-avatar {
  width: 44px; height: 44px;
  border-radius: 11px;
  background: var(--navy);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: #7ab8e8;
  flex-shrink: 0;
}
.cust-info { flex: 1; min-width: 0; }
.cust-name { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cust-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
.caret { font-size: 13px; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
.cust-card.open .caret { transform: rotate(90deg); }
.cust-actions {
  display: none;
  border-top: 1px solid var(--border);
  padding: 12px 14px;
  gap: 8px;
}
.cust-card.open .cust-actions { display: flex; }
.btn-report {
  flex: 1;
  background: var(--navy);
  border: none;
  border-radius: 11px;
  padding: 12px;
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  min-height: 44px;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-delete {
  background: #fff;
  border: 1.5px solid var(--danger);
  border-radius: 11px;
  padding: 12px 14px;
  font-size: 15px;
  color: var(--danger);
  cursor: pointer;
  min-height: 44px;
  min-width: 44px;
  display: flex; align-items: center; justify-content: center;
}

/* ── REPORT ── */
.rep-nav {
  background: var(--navy2);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px 12px;
  flex-shrink: 0;
}
.btn-back {
  background: rgba(255,255,255,0.12);
  border: none;
  border-radius: 10px;
  padding: 9px 13px;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  min-height: 44px;
  display: flex; align-items: center; gap: 5px;
}
.rep-name {
  flex: 1;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rep-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--safe-area-bottom) + 80px);
}
/* folders */
.folders-sec { padding: 14px 16px 8px; }
.folders-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.folders-top h3 { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.6px; text-transform: uppercase; }
.btn-new-folder {
  background: var(--navy);
  border: none;
  border-radius: 9px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  min-height: 38px;
}
.folder-list { display: flex; flex-direction: column; gap: 6px; }
.folder-item {
  background: var(--card);
  border-radius: 12px;
  border: 1.5px solid var(--border);
  display: flex;
  align-items: stretch;
  overflow: hidden;
  min-height: 52px;
}
.folder-item.active { border-color: var(--navy); background: #ecf2fb; }
.folder-item.filled { border-color: var(--safe); }
.folder-body {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  cursor: pointer;
  min-width: 0;
}
.folder-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.folder-item.active .folder-dot { background: var(--navy); }
.folder-item.filled .folder-dot { background: var(--safe); }
.folder-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.folder-count { font-size: 12px; color: var(--muted); flex-shrink: 0; }
.folder-item.filled .folder-count { color: var(--safe); font-weight: 600; }
.active-tag {
  font-size: 9px; font-weight: 800;
  background: var(--navy); color: #fff;
  border-radius: 4px; padding: 2px 6px;
  flex-shrink: 0;
}
.folder-del {
  background: #fff5f5;
  border: none;
  border-left: 1px solid var(--border);
  padding: 0 16px;
  cursor: pointer;
  color: var(--danger);
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  min-width: 52px;
}
.folder-item.active .folder-del { background: #e6edf7; border-left-color: #c5d5ea; }
.no-folders { font-size: 13px; color: var(--muted); padding: 8px 4px; text-align: center; }

/* new folder inline */
.new-folder-bar {
  display: none;
  margin: 6px 0 0;
  background: #eaf0f7;
  border-radius: 12px;
  padding: 10px 12px;
  gap: 8px;
  align-items: center;
}
.new-folder-bar.on { display: flex; }
.new-folder-inp {
  flex: 1;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 10px 12px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  background: #fff;
  min-height: 44px;
}
.new-folder-inp:focus { border-color: var(--navy); }
.btn-save-f { background: var(--navy); border: none; border-radius: 9px; padding: 10px 14px; font-size: 13px; font-weight: 700; color: #fff; cursor: pointer; min-height: 44px; }
.btn-cancel-f { background: #dde4ed; border: none; border-radius: 9px; padding: 10px 12px; font-size: 13px; cursor: pointer; min-height: 44px; }

/* capture */
.capture-sec { padding: 12px 16px 0; }
.active-folder-pill {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--navy);
  border-radius: 20px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 14px;
  max-width: 100%;
  overflow: hidden;
}
.pill-live { width: 8px; height: 8px; background: var(--green); border-radius: 50%; flex-shrink: 0; }
.pill-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.capture-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
.cap-btn {
  border: none;
  border-radius: 14px;
  padding: 16px 12px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  min-height: 80px;
  transition: transform 0.1s, opacity 0.1s;
}
.cap-btn:active { transform: scale(0.96); opacity: 0.85; }
.cap-btn .cap-icon { font-size: 28px; line-height: 1; }
.cap-photo { background: #dceeff; color: #0c447c; }
.cap-video { background: #fde8e8; color: #791f1f; }
.cap-audio { background: #fef3dc; color: #633806; }
.cap-note  { background: #dff5ec; color: #085041; }

/* recording */
.rec-bar {
  display: none;
  background: #fde8e8;
  border-radius: 12px;
  padding: 12px 14px;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  border: 1px solid #f09595;
}
.rec-bar.on { display: flex; }
.rec-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.rec-label { flex: 1; font-size: 13px; font-weight: 600; color: var(--danger); }
.btn-stop {
  background: var(--danger);
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  min-height: 38px;
}

/* media list */
.media-list { display: flex; flex-direction: column; gap: 8px; }
.media-empty { font-size: 13px; color: var(--muted); text-align: center; padding: 16px; }
.media-item {
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  min-height: 60px;
}
.media-thumb { width: 64px; height: 64px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: #e8e4de; cursor: pointer; }
.media-icon  { width: 64px; height: 64px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
.media-body { flex: 1; min-width: 0; }
.media-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.media-sub  { font-size: 11px; color: var(--muted); margin-top: 3px; }
.media-item.expanded { flex-direction: column; align-items: stretch; }
.media-item.expanded .media-top { display: flex; align-items: center; gap: 10px; }
.media-item.expanded .media-thumb { width: 100%; height: 200px; border-radius: 10px; margin-bottom: 0; }
.media-item.expanded .media-preview { margin-top: 8px; width: 100%; }
.media-item.expanded .media-preview video,
.media-item.expanded .media-preview audio { width: 100%; border-radius: 8px; display: block; }
.media-item.expanded .media-preview audio { margin-top: 4px; }
.expand-btn { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; min-width: 32px; min-height: 32px; display: flex; align-items: center; justify-content: center; }
.media-del {
  background: none;
  border: none;
  color: var(--danger);
  cursor: pointer;
  font-size: 20px;
  padding: 6px;
  min-width: 38px;
  min-height: 38px;
  display: flex; align-items: center; justify-content: center;
}

/* footer */
.rep-footer {
  background: var(--card);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  padding-bottom: calc(var(--safe-area-bottom) + 12px);
  flex-shrink: 0;
}
.btn-zip {
  width: 100%;
  background: var(--navy);
  border: none;
  border-radius: 14px;
  padding: 15px;
  font-size: 15px;
  font-weight: 800;
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  min-height: 52px;
}
.btn-zip:active { background: var(--navy3); }

/* note modal */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.overlay.on { display: flex; }
.sheet {
  background: var(--card);
  border-radius: 22px 22px 0 0;
  padding: 20px 20px;
  padding-bottom: calc(var(--safe-area-bottom) + 20px);
  width: 100%;
  max-width: 500px;
}
.sheet h3 { font-size: 17px; font-weight: 700; margin-bottom: 12px; }
.sheet textarea {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 15px;
  font-family: inherit;
  outline: none;
  resize: none;
  min-height: 130px;
  margin-bottom: 14px;
}
.sheet textarea:focus { border-color: var(--navy); }
.sheet-btns { display: flex; gap: 10px; }
.btn-sheet-cancel { flex: 1; background: #f0ede8; border: none; border-radius: 12px; padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; min-height: 50px; }
.btn-sheet-ok { flex: 1; background: var(--navy); border: none; border-radius: 12px; padding: 13px; font-size: 15px; font-weight: 700; color: #fff; cursor: pointer; min-height: 50px; }

/* toast */
.toast {
  position: fixed;
  bottom: calc(var(--safe-area-bottom) + 90px);
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: rgba(26,42,58,0.95);
  color: #fff;
  padding: 11px 20px;
  border-radius: 22px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.25s;
  white-space: nowrap;
  z-index: 500;
  pointer-events: none;
  backdrop-filter: blur(4px);
}
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

input[type=file] { display: none; }
.cap-btn input[type=file] { display: none; }
.cap-btn { cursor: pointer; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-inner">
      <img class="header-logo" src="icons/logo.png" alt="Öncü" onerror="this.style.display='none';document.getElementById('hLogoFb').style.display='flex'">
      <div class="header-logo-fallback" id="hLogoFb" style="display:none">ÖNCÜ</div>
      <div class="header-text">
        <h1>Öncü Rapor</h1>
        <p>Saha Fotoğraf Sistemi</p>
      </div>
    </div>
  </div>

  <!-- HOME -->
  <div class="screen on" id="sHome">
    <div class="home-top">
      <div class="add-row">
        <input class="add-inp" id="custInp" type="text" placeholder="Müşteri adı ekle..." maxlength="60" autocomplete="off" autocorrect="off">
        <button class="btn-add" onclick="addCustomer()">Ekle</button>
      </div>
    </div>
    <div class="home-scroll">
      <div class="section-row">
        <span class="section-label">Müşteriler</span>
        <span class="count-pill" id="custCount">0</span>
      </div>
      <div id="custList">
        <div class="empty-state" id="emptyState">
          <div class="icon">👥</div>
          <p>Henüz müşteri yok.<br>Yukarıdan ekleyin.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- REPORT -->
  <div class="screen" id="sReport">
    <div class="rep-nav">
      <button class="btn-back" onclick="goHome()">← Geri</button>
      <span class="rep-name" id="repName"></span>
    </div>
    <div class="rep-scroll">
      <div class="folders-sec">
        <div class="folders-top">
          <h3>Klasörler</h3>
          <button class="btn-new-folder" onclick="toggleNewFolder()">+ Yeni Klasör</button>
        </div>
        <div class="new-folder-bar" id="newFolderBar">
          <input class="new-folder-inp" id="newFolderInp" type="text" placeholder="Klasör adı..." maxlength="50" autocomplete="off">
          <button class="btn-save-f" onclick="saveFolder()">Ekle</button>
          <button class="btn-cancel-f" onclick="toggleNewFolder()">İptal</button>
        </div>
        <div class="folder-list" id="folderList"></div>
      </div>

      <div class="capture-sec">
        <div class="active-folder-pill">
          <div class="pill-live"></div>
          <span class="pill-text" id="activeFolderLabel">Klasör seçin</span>
        </div>

        <div class="rec-bar" id="recBar">
          <div class="rec-dot"></div>
          <span class="rec-label" id="recLabel">Kayıt yapılıyor...</span>
          <button class="btn-stop" onclick="stopAudio()">■ Durdur</button>
        </div>

        <div class="capture-grid">
          <label class="cap-btn cap-photo" id="lblCamera" onclick="return checkFolderLabel()">
            <span class="cap-icon">📷</span>Kamera
            <input type="file" accept="image/*" capture="environment" multiple onchange="handlePhoto(this)">
          </label>
          <label class="cap-btn cap-photo" style="background:#c8e0ff" id="lblGallery" onclick="return checkFolderLabel()">
            <span class="cap-icon">🖼️</span>Galeri
            <input type="file" accept="image/*" multiple onchange="handlePhoto(this)">
          </label>
          <label class="cap-btn cap-video" id="lblVideo" onclick="return checkFolderLabel()">
            <span class="cap-icon">🎥</span>Video Çek
            <input type="file" accept="video/*" capture="environment" onchange="handleVideo(this)">
          </label>
          <button class="cap-btn cap-audio" onclick="doAudio()">
            <span class="cap-icon">🎙️</span>Ses Kaydet
          </button>
          <button class="cap-btn cap-note" onclick="openNote()" style="grid-column:span 2">
            <span class="cap-icon">📝</span>Not Ekle
          </button>
        </div>

        <div class="media-list" id="mediaList"></div>
      </div>
    </div>
    <div class="rep-footer">
      <button class="btn-zip" onclick="doZip()">
        ⬇ ZIP İNDİR
      </button>
    </div>
  </div>
</div>

<!-- NOTE SHEET -->
<div class="overlay" id="noteOverlay">
  <div class="sheet">
    <h3>Not Ekle</h3>
    <textarea id="noteTA" placeholder="Notunuzu buraya yazın..."></textarea>
    <div class="sheet-btns">
      <button class="btn-sheet-cancel" onclick="closeNote()">İptal</button>
      <button class="btn-sheet-ok" onclick="saveNote()">Kaydet</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<input type="file" id="photoInput" accept="image/*" multiple>
<input type="file" id="videoInput" accept="video/*">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ── STATE ──
let custs = JSON.parse(localStorage.getItem('oncu_v4') || '[]');
let curIdx = null, activeFolder = null;
let mediaRec = null, audioChunks = [], isRec = false, recTimer = null, recSecs = 0;

function save() { localStorage.setItem('oncu_v4', JSON.stringify(custs)); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('on'), 2400);
}

function initials(n) {
  return n.split(/[\s_\-]/).slice(0,2).map(w => w[0] || '').join('').toUpperCase() || '?';
}
function totalMedia(c) {
  return Object.values(c.folders || {}).reduce((s, f) => s + (f.items || []).length, 0);
}

// ── HOME ──
function renderHome() {
  document.getElementById('custCount').textContent = custs.length;
  const list = document.getElementById('custList');
  const empty = document.getElementById('emptyState');
  if (!custs.length) { list.innerHTML = ''; list.appendChild(empty); return; }
  list.innerHTML = custs.map((c, i) => {
    const tm = totalMedia(c), fc = Object.keys(c.folders || {}).length;
    return `<div class="cust-card" id="cc${i}">
      <div class="cust-row" onclick="toggleCust(${i})">
        <div class="cust-avatar">${initials(c.name)}</div>
        <div class="cust-info">
          <div class="cust-name">${escH(c.name)}</div>
          <div class="cust-meta">${tm} dosya · ${fc} klasör</div>
        </div>
        <span class="caret">▶</span>
      </div>
      <div class="cust-actions">
        <button class="btn-report" onclick="openReport(${i})">📂 Raporu Aç</button>
        <button class="btn-delete" onclick="deleteCust(${i})">🗑</button>
      </div>
    </div>`;
  }).join('');
}
function toggleCust(i) { document.getElementById('cc' + i).classList.toggle('open'); }
function addCustomer() {
  const inp = document.getElementById('custInp');
  const name = inp.value.trim();
  if (!name) { toast('Müşteri adı girin'); return; }
  if (custs.find(c => c.name === name)) { toast('Bu müşteri zaten var'); return; }
  custs.unshift({ name, folders: {}, created: Date.now() });
  save(); inp.value = ''; renderHome(); toast(name + ' eklendi ✓');
}
function deleteCust(i) {
  if (!confirm(`"${custs[i].name}" silinsin mi? Tüm dosyalar silinecek.`)) return;
  custs.splice(i, 1); save(); renderHome();
}
function goHome() {
  if (isRec) stopAudio();
  document.getElementById('sReport').classList.remove('on');
  document.getElementById('sHome').classList.add('on');
  renderHome();
}

// ── REPORT ──
function openReport(i) {
  curIdx = i; activeFolder = null;
  document.getElementById('repName').textContent = custs[i].name;
  document.getElementById('activeFolderLabel').textContent = 'Klasör seçin';
  renderFolders(); renderMedia();
  document.getElementById('sHome').classList.remove('on');
  document.getElementById('sReport').classList.add('on');
  document.querySelector('.rep-scroll').scrollTop = 0;
}

// ── FOLDERS ──
function renderFolders() {
  const folders = custs[curIdx].folders || {};
  const html = Object.entries(folders).map(([id, f]) => {
    const n = (f.items || []).length, isA = activeFolder === id, has = n > 0;
    return `<div class="folder-item ${isA ? 'active' : ''} ${has ? 'filled' : ''}">
      <div class="folder-body" onclick="selectFolder('${id}','${escH(f.name)}')">
        <div class="folder-dot"></div>
        <span class="folder-name">${escH(f.name)}</span>
        <span class="folder-count">${n > 0 ? '✓ ' + n : '—'}</span>
        ${isA ? '<span class="active-tag">AKTİF</span>' : ''}
      </div>
      <button class="folder-del" onclick="deleteFolder('${id}')">×</button>
    </div>`;
  }).join('');
  document.getElementById('folderList').innerHTML = html ||
    '<p class="no-folders">Henüz klasör yok. "+ Yeni Klasör" ekleyin.</p>';
}
function selectFolder(id, name) {
  expandedItems = new Set();
  activeFolder = id;
  document.getElementById('activeFolderLabel').textContent = name;
  renderFolders(); renderMedia();
}
function deleteFolder(id) {
  const f = custs[curIdx].folders[id];
  if ((f.items || []).length > 0 && !confirm('Klasördeki tüm dosyalar silinecek. Devam?')) return;
  delete custs[curIdx].folders[id];
  if (activeFolder === id) { activeFolder = null; document.getElementById('activeFolderLabel').textContent = 'Klasör seçin'; }
  save(); renderFolders(); renderMedia();
}
function toggleNewFolder() {
  const bar = document.getElementById('newFolderBar');
  bar.classList.toggle('on');
  if (bar.classList.contains('on')) {
    document.getElementById('newFolderInp').value = '';
    setTimeout(() => {
      document.getElementById('newFolderInp').focus();
      bar.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
  }
}
function saveFolder() {
  const name = document.getElementById('newFolderInp').value.trim();
  if (!name) { toast('Klasör adı girin'); return; }
  if (!custs[curIdx].folders) custs[curIdx].folders = {};
  const id = 'f' + Date.now();
  custs[curIdx].folders[id] = { name, items: [] };
  save(); toggleNewFolder(); renderFolders(); selectFolder(id, name); toast(name + ' eklendi ✓');
}

// ── MEDIA ──
let expandedItems = new Set();
function toggleExpand(i) {
  if (expandedItems.has(i)) expandedItems.delete(i);
  else expandedItems.add(i);
  renderMedia();
}
function renderMedia() {
  const ml = document.getElementById('mediaList');
  if (!activeFolder || !custs[curIdx].folders[activeFolder]) { ml.innerHTML = ''; return; }
  const items = custs[curIdx].folders[activeFolder].items || [];
  if (!items.length) { ml.innerHTML = '<p class="media-empty">Bu klasörde henüz dosya yok</p>'; return; }
  const bgs   = { photo: '#dceeff', video: '#fde8e8', audio: '#fef3dc', note: '#dff5ec' };
  const types = { photo: 'Fotoğraf', video: 'Video', audio: 'Ses Kaydı', note: 'Not' };
  ml.innerHTML = items.map((m, i) => {
    const exp = expandedItems.has(i);
    if (m.type === 'photo') {
      if (exp) {
        return `<div class="media-item expanded">
          <div class="media-top">
            <div class="media-body"><div class="media-name">${escH(m.name)}</div><div class="media-sub">Fotoğraf</div></div>
            <button class="expand-btn" onclick="toggleExpand(${i})">▲</button>
            <button class="media-del" onclick="deleteMedia(${i})">×</button>
          </div>
          <img src="${m.data}" style="width:100%;border-radius:10px;margin-top:8px;display:block">
        </div>`;
      }
      return `<div class="media-item">
        <img class="media-thumb" src="${m.data}" loading="lazy" onclick="toggleExpand(${i})">
        <div class="media-body"><div class="media-name">${escH(m.name)}</div><div class="media-sub">Fotoğraf · görmek için dokun</div></div>
        <button class="media-del" onclick="deleteMedia(${i})">×</button>
      </div>`;
    }
    if (m.type === 'video') {
      if (exp) {
        return `<div class="media-item expanded">
          <div class="media-top">
            <div class="media-icon" style="background:${bgs.video}">🎥</div>
            <div class="media-body"><div class="media-name">${escH(m.name)}</div><div class="media-sub">Video</div></div>
            <button class="expand-btn" onclick="toggleExpand(${i})">▲</button>
            <button class="media-del" onclick="deleteMedia(${i})">×</button>
          </div>
          <div class="media-preview"><video src="${m.data}" controls playsinline style="width:100%;border-radius:10px;margin-top:8px;max-height:240px"></video></div>
        </div>`;
      }
      return `<div class="media-item">
        <div class="media-icon" style="background:${bgs.video};cursor:pointer" onclick="toggleExpand(${i})">🎥</div>
        <div class="media-body"><div class="media-name">${escH(m.name)}</div><div class="media-sub">Video · oynatmak için dokun</div></div>
        <button class="media-del" onclick="deleteMedia(${i})">×</button>
      </div>`;
    }
    if (m.type === 'audio') {
      if (exp) {
        return `<div class="media-item expanded">
          <div class="media-top">
            <div class="media-icon" style="background:${bgs.audio}">🎙️</div>
            <div class="media-body"><div class="media-name">${escH(m.name)}</div><div class="media-sub">Ses Kaydı${m.dur ? ' · ' + m.dur : ''}</div></div>
            <button class="expand-btn" onclick="toggleExpand(${i})">▲</button>
            <button class="media-del" onclick="deleteMedia(${i})">×</button>
          </div>
          <div class="media-preview"><audio src="${m.data}" controls style="width:100%;margin-top:8px"></audio></div>
        </div>`;
      }
      return `<div class="media-item">
        <div class="media-icon" style="background:${bgs.audio};cursor:pointer" onclick="toggleExpand(${i})">🎙️</div>
        <div class="media-body"><div class="media-name">${escH(m.name)}</div><div class="media-sub">Ses Kaydı${m.dur ? ' · ' + m.dur : ''} · dinlemek için dokun</div></div>
        <button class="media-del" onclick="deleteMedia(${i})">×</button>
      </div>`;
    }
    // note
    return `<div class="media-item">
      <div class="media-icon" style="background:${bgs.note}">📝</div>
      <div class="media-body">
        <div class="media-name" style="white-space:normal;font-size:12px;line-height:1.4">${escH(m.text)}</div>
        <div class="media-sub">Not · ${m.ts || ''}</div>
      </div>
      <button class="media-del" onclick="deleteMedia(${i})">×</button>
    </div>`;
  }).join('');
}
function deleteMedia(idx) {
  custs[curIdx].folders[activeFolder].items.splice(idx, 1);
  save(); renderFolders(); renderMedia();
}
function checkFolder() {
  if (!activeFolder) { toast('Önce bir klasör seçin'); return false; } return true;
}
function pushItem(item) {
  custs[curIdx].folders[activeFolder].items.push(item);
  save(); renderFolders(); renderMedia();
}

// ── FOLDER LABEL CHECK (label inputs) ──
function checkFolderLabel() {
  if (!activeFolder) { toast('Önce bir klasör seçin'); return false; }
  return true;
}

// ── PHOTO ──
function handlePhoto(inp) {
  if (!activeFolder) { toast('Önce bir klasör seçin'); inp.value=''; return; }
  const files = Array.from(inp.files); if (!files.length) return;
  let done = 0;
  files.forEach(file => {
    const r = new FileReader();
    r.onload = ev => {
      pushItem({ type: 'photo', name: file.name || 'foto_' + Date.now() + '.jpg', data: ev.target.result });
      if (++done === files.length) toast(files.length + ' fotoğraf eklendi ✓');
    };
    r.readAsDataURL(file);
  });
  inp.value = '';
}
function doPhoto() { if (!checkFolder()) return; document.getElementById('photoInput').click(); }
document.getElementById('photoInput').addEventListener('change', function(e) {
  handlePhoto(this);
});

// ── VIDEO ──
function handleVideo(inp) {
  if (!activeFolder) { toast('Önce bir klasör seçin'); inp.value=''; return; }
  const file = inp.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    pushItem({ type: 'video', name: file.name || 'video_' + Date.now() + '.mp4', data: ev.target.result, size: fmtSize(file.size) });
    toast('Video eklendi ✓');
  };
  r.readAsDataURL(file);
  inp.value = '';
}
function doVideo() { if (!checkFolder()) return; document.getElementById('videoInput').click(); }
document.getElementById('videoInput').addEventListener('change', function(e) {
  handleVideo(this);
});

// ── AUDIO ──
async function doAudio() {
  if (!checkFolder()) return;
  if (isRec) { stopAudio(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRec = new MediaRecorder(stream);
    mediaRec.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRec.onstop = () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const r = new FileReader();
      r.onload = ev => {
        const name = 'ses_' + new Date().toISOString().slice(0,19).replace(/[:T]/g,'-') + '.webm';
        pushItem({ type: 'audio', name, data: ev.target.result, dur: fmtDur(recSecs) });
        toast('Ses kaydı eklendi ✓');
      };
      r.readAsDataURL(blob);
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRec.start();
    isRec = true; recSecs = 0;
    document.getElementById('recBar').classList.add('on');
    recTimer = setInterval(() => {
      recSecs++;
      document.getElementById('recLabel').textContent = '● Kayıt: ' + fmtDur(recSecs);
    }, 1000);
  } catch(err) { toast('Mikrofon erişimi reddedildi'); }
}
function stopAudio() {
  if (!isRec) return;
  isRec = false;
  clearInterval(recTimer);
  mediaRec.stop();
  document.getElementById('recBar').classList.remove('on');
  document.getElementById('recLabel').textContent = 'Kayıt yapılıyor...';
}

// ── NOTE ──
function openNote() { if (!checkFolder()) return; document.getElementById('noteTA').value = ''; document.getElementById('noteOverlay').classList.add('on'); setTimeout(() => document.getElementById('noteTA').focus(), 120); }
function closeNote() { document.getElementById('noteOverlay').classList.remove('on'); }
function saveNote() {
  const text = document.getElementById('noteTA').value.trim();
  if (!text) { toast('Not boş olamaz'); return; }
  pushItem({ type: 'note', text, ts: new Date().toLocaleString('tr-TR') });
  closeNote(); toast('Not kaydedildi ✓');
}

// ── ZIP ──
async function doZip() {
  const c = custs[curIdx];
  if (totalMedia(c) === 0) { toast('Önce dosya ekleyin'); return; }
  toast('ZIP hazırlanıyor...');
  try {
    const zip = new JSZip();
    const safeName = c.name.replace(/[^\w\-\u00C0-\u024F]/g, '_');
    const root = zip.folder(safeName);
    let summary = `ÖNCÜ RAPOR\nMüşteri: ${c.name}\nTarih: ${new Date().toLocaleDateString('tr-TR')}\nSaat: ${new Date().toLocaleTimeString('tr-TR')}\n`;
    for (const [, f] of Object.entries(c.folders || {})) {
      const items = f.items || [];
      if (!items.length) continue;
      const folderSafe = f.name.replace(/[^\w\-\u00C0-\u024F ]/g, '_');
      const zf = root.folder(folderSafe);
      summary += `\n[ ${f.name} ] — ${items.length} dosya\n`;
      let pi=1, vi=1, ai=1, notesTxt='';
      for (const m of items) {
        const b64 = m.data ? m.data.split(',')[1] : null;
        if (m.type === 'photo') {
          const ext = m.data.startsWith('data:image/png') ? 'png' : 'jpg';
          zf.file(`foto_${String(pi).padStart(2,'0')}.${ext}`, b64, { base64: true });
          summary += `  - foto_${String(pi++).padStart(2,'0')}.${ext}\n`;
        } else if (m.type === 'video') {
          zf.file(`video_${String(vi).padStart(2,'0')}.mp4`, b64, { base64: true });
          summary += `  - video_${String(vi++).padStart(2,'0')}.mp4\n`;
        } else if (m.type === 'audio') {
          zf.file(`ses_${String(ai).padStart(2,'0')}.webm`, b64, { base64: true });
          summary += `  - ses_${String(ai++).padStart(2,'0')}.webm (${m.dur || ''})\n`;
        } else if (m.type === 'note') {
          notesTxt += `[${m.ts || ''}]\n${m.text}\n\n`;
          summary += `  - Not: "${m.text.slice(0,40)}"\n`;
        }
      }
      if (notesTxt) zf.file('notlar.txt', notesTxt);
    }
    root.file('rapor_ozeti.txt', summary);
    const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${safeName}_${new Date().toISOString().slice(0,10)}.zip`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    toast('ZIP indirildi ✓');
  } catch(err) { toast('Hata: ' + err.message); }
}

// ── UTILS ──
function fmtDur(s) { return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); }
function fmtSize(b) { return b > 1048576 ? (b/1048576).toFixed(1)+'MB' : (b/1024).toFixed(0)+'KB'; }
function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── KEYBOARD ──
document.getElementById('custInp').addEventListener('keydown', e => { if (e.key === 'Enter') addCustomer(); });
document.getElementById('newFolderInp').addEventListener('keydown', e => { if (e.key === 'Enter') saveFolder(); });

// ── INIT ──
renderHome();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
</script>
