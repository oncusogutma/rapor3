<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f2540">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Öncü Rapor">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Öncü Rapor</title>
<style>
:root{
  --nv:#0f2540; --nv2:#1a3a5c; --nv3:#234d78;
  --green:#25d366; --safe:#1d9e75; --danger:#e04040;
  --bg:#f0ede8; --card:#fff; --muted:#8496a9; --bdr:#e2ddd7; --txt:#1a2a3a;
  --sat: env(safe-area-inset-top,0px);
  --sab: env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:-apple-system,'Helvetica Neue',system-ui,sans-serif;-webkit-font-smoothing:antialiased}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100%;height:100dvh}
.hdr{background:var(--nv);padding:var(--sat) 0 0;flex-shrink:0;z-index:10}
.hdr-inner{display:flex;align-items:center;gap:12px;padding:12px 16px 14px}
.hdr-logo{width:38px;height:38px;border-radius:9px;background:#fff;object-fit:contain;padding:2px;flex-shrink:0}
.hdr-logo-fb{width:38px;height:38px;border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:var(--nv);flex-shrink:0;display:none}
.hdr-text h1{font-size:17px;font-weight:700;color:#fff;letter-spacing:-0.3px}
.hdr-text p{font-size:11px;color:#7ab8e8;margin-top:1px}

.scr{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.scr.on{display:flex}

/* ── HOME ── */
.home-top{background:var(--nv);padding:0 16px 16px;flex-shrink:0}
.add-row{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.15);border-radius:14px;display:flex;align-items:center;gap:10px;padding:10px 10px 10px 14px}
.add-inp{flex:1;background:transparent;border:none;font-size:15px;color:#fff;font-family:inherit;outline:none;min-width:0}
.add-inp::placeholder{color:rgba(255,255,255,.35)}
.btn-add{background:var(--green);border:none;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0;min-height:44px;min-width:44px}

.home-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px;padding-bottom:calc(var(--sab) + 16px)}
.sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-lbl{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase}
.cnt-pill{background:var(--nv);color:#7ab8e8;font-size:11px;font-weight:700;border-radius:20px;padding:3px 9px}
.empty-state{text-align:center;padding:52px 24px;color:var(--muted)}
.empty-state .ei{font-size:44px;margin-bottom:12px}
.empty-state p{font-size:15px;line-height:1.5}

.ccard{background:var(--card);border-radius:16px;border:1px solid var(--bdr);margin-bottom:10px;overflow:hidden}
.crow{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;min-height:68px;user-select:none}
.av{width:44px;height:44px;border-radius:11px;background:var(--nv);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#7ab8e8;flex-shrink:0}
.ci{flex:1;min-width:0}
.cn{font-size:15px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cm{font-size:12px;color:var(--muted);margin-top:3px}
.caret{font-size:13px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.ccard.op .caret{transform:rotate(90deg)}
.cacts{display:none;border-top:1px solid var(--bdr);padding:12px 14px;gap:8px}
.ccard.op .cacts{display:flex}
.btn-rpt{flex:1;background:var(--nv);border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;min-height:48px;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-del{background:#fff;border:1.5px solid var(--danger);border-radius:12px;padding:13px 16px;font-size:15px;color:var(--danger);cursor:pointer;min-height:48px;min-width:48px;display:flex;align-items:center;justify-content:center}

/* ── REPORT ── */
.rep-nav{background:var(--nv2);display:flex;align-items:center;gap:10px;padding:11px 16px 13px;flex-shrink:0}
.btn-back{background:rgba(255,255,255,.12);border:none;border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;min-height:44px;min-width:44px}
.rep-nm{flex:1;font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.rep-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--sab) + 80px)}

/* ── FOLDERS ── */
.folders-sec{padding:14px 16px 8px}
.ftop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ftop h3{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase}
.btn-nf{background:var(--nv);border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;min-height:40px}

.flist{display:flex;flex-direction:column;gap:6px}
.fitem{background:var(--card);border-radius:13px;border:1.5px solid var(--bdr);display:flex;align-items:stretch;overflow:hidden;min-height:52px}
.fitem.act{border-color:var(--nv);background:#ecf2fb}
.fitem.fil{border-color:var(--safe)}
.fbody{flex:1;display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;min-width:0;user-select:none}
.fdot{width:10px;height:10px;border-radius:50%;background:var(--bdr);flex-shrink:0;transition:background .15s}
.fitem.act .fdot{background:var(--nv)}
.fitem.fil .fdot{background:var(--safe)}
.fnm{font-size:14px;font-weight:600;color:var(--txt);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fcnt{font-size:12px;color:var(--muted);flex-shrink:0}
.fitem.fil .fcnt{color:var(--safe);font-weight:600}
.ftag{font-size:9px;font-weight:800;background:var(--nv);color:#fff;border-radius:4px;padding:2px 6px;flex-shrink:0}
.fdel{background:#fff5f5;border:none;border-left:1px solid var(--bdr);padding:0 18px;cursor:pointer;color:var(--danger);font-size:20px;display:flex;align-items:center;justify-content:center;min-width:52px}
.no-f{font-size:13px;color:var(--muted);text-align:center;padding:12px 4px}

/* ── CAPTURE ── */
.cap-sec{padding:12px 16px 0}
.apl{display:inline-flex;align-items:center;gap:7px;background:var(--nv);border-radius:20px;padding:8px 14px;font-size:13px;font-weight:600;color:#fff;margin-bottom:14px;max-width:100%;overflow:hidden}
.pldot{width:8px;height:8px;background:var(--green);border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.pltext{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.rec-bar{display:none;background:#fde8e8;border-radius:12px;padding:12px 14px;align-items:center;gap:10px;margin-bottom:14px;border:1px solid #f09595}
.rec-bar.on{display:flex}
.rec-dot{width:10px;height:10px;border-radius:50%;background:var(--danger);animation:blink 1s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.rec-lbl{flex:1;font-size:13px;font-weight:600;color:var(--danger)}
.btn-stop{background:var(--danger);border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;min-height:40px}

.cap-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.cbtn{border:none;border-radius:14px;padding:16px 10px;font-size:13px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;min-height:80px;transition:transform .1s,opacity .1s;user-select:none;-webkit-user-select:none}
.cbtn:active{transform:scale(.95);opacity:.8}
.cbtn .ci2{font-size:28px;line-height:1;pointer-events:none}
.cbtn input[type=file]{display:none}
.cbtn-cam{background:#dceeff;color:#0c447c}
.cbtn-gal{background:#e8f4ff;color:#0c447c}
.cbtn-vid{background:#fde8e8;color:#791f1f}
.cbtn-aud{background:#fef3dc;color:#633806}
.cbtn-not{background:#dff5ec;color:#085041;grid-column:span 2}

/* ── MEDIA LIST ── */
.media-list{display:flex;flex-direction:column;gap:8px}
.media-empty{font-size:13px;color:var(--muted);text-align:center;padding:20px}
.mitem{background:var(--card);border-radius:13px;border:1px solid var(--bdr);overflow:hidden}
.mitem-row{display:flex;align-items:center;gap:10px;padding:10px 12px;min-height:60px}
.mthumb{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0;cursor:pointer}
.micon{width:56px;height:56px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;cursor:pointer}
.minfo{flex:1;min-width:0}
.mname{font-size:13px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msub{font-size:11px;color:var(--muted);margin-top:3px}
.mdel{background:none;border:none;color:var(--danger);cursor:pointer;font-size:22px;padding:6px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* expand */
.mpreview{padding:0 10px 10px;display:none}
.mitem.exp .mpreview{display:block}
.mpreview img{width:100%;border-radius:10px;display:block;max-height:300px;object-fit:contain;background:#000}
.mpreview video{width:100%;border-radius:10px;display:block;max-height:260px;background:#000}
.mpreview audio{width:100%;display:block;margin-top:4px}
.mpreview .note-txt{font-size:14px;color:var(--txt);line-height:1.5;padding:4px 2px;white-space:pre-wrap}
.expand-hint{font-size:11px;color:var(--muted);font-style:italic}

/* ── FOOTER ── */
.rep-footer{background:var(--card);border-top:1px solid var(--bdr);padding:12px 16px;padding-bottom:calc(var(--sab) + 12px);flex-shrink:0}
.btn-zip{width:100%;background:var(--nv);border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:800;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;min-height:52px}
.btn-zip:active{background:var(--nv3)}

/* ── MODALS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center;padding:0}
.overlay.on{display:flex}
.sheet{background:var(--card);border-radius:22px 22px 0 0;padding:20px;padding-bottom:calc(var(--sab) + 20px);width:100%;max-width:500px}
.sheet h3{font-size:17px;font-weight:700;margin-bottom:14px}
.sheet-inp{width:100%;border:1.5px solid var(--bdr);border-radius:12px;padding:14px;font-size:16px;font-family:inherit;outline:none;margin-bottom:14px;-webkit-appearance:none}
.sheet-inp:focus{border-color:var(--nv)}
.sheet textarea{width:100%;border:1.5px solid var(--bdr);border-radius:12px;padding:14px;font-size:15px;font-family:inherit;outline:none;resize:none;min-height:130px;margin-bottom:14px;-webkit-appearance:none}
.sheet textarea:focus{border-color:var(--nv)}
.sheet-btns{display:flex;gap:10px}
.btn-sc{flex:1;background:#f0ede8;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;min-height:50px}
.btn-so{flex:1;background:var(--nv);border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;min-height:50px}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--sab) + 90px);left:50%;transform:translateX(-50%) translateY(14px);background:rgba(26,42,58,.95);color:#fff;padding:12px 22px;border-radius:24px;font-size:14px;font-weight:500;opacity:0;transition:all .25s;white-space:nowrap;z-index:500;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* hide old standalone inputs */
#photoInput,#videoInput{display:none}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-inner">
      <img class="hdr-logo" src="icon-192.png" alt="Öncü" onerror="this.style.display='none';document.getElementById('hfb').style.display='flex'">
      <div class="hdr-logo-fb" id="hfb">ÖNCÜ</div>
      <div class="hdr-text"><h1>Öncü Rapor</h1><p>Saha Fotoğraf Sistemi</p></div>
    </div>
  </div>

  <!-- HOME -->
  <div class="scr on" id="sHome">
    <div class="home-top">
      <div class="add-row">
        <input class="add-inp" id="custInp" type="text" placeholder="Müşteri adı ekle..." maxlength="60" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="btn-add" onclick="addCustomer()">+</button>
      </div>
    </div>
    <div class="home-scroll">
      <div class="sec-row">
        <span class="sec-lbl">Müşteriler</span>
        <span class="cnt-pill" id="custCnt">0</span>
      </div>
      <div id="custList">
        <div class="empty-state" id="emptyState">
          <div class="ei">👥</div>
          <p>Henüz müşteri yok.<br>Yukarıdan ekleyin.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- REPORT -->
  <div class="scr" id="sReport">
    <div class="rep-nav">
      <button class="btn-back" onclick="goHome()">← Geri</button>
      <span class="rep-nm" id="repName"></span>
    </div>
    <div class="rep-scroll" id="repScroll">

      <!-- FOLDERS -->
      <div class="folders-sec">
        <div class="ftop">
          <h3>Klasörler</h3>
          <button class="btn-nf" onclick="openFolderModal()">+ Yeni Klasör</button>
        </div>
        <div class="flist" id="folderList"></div>
      </div>

      <!-- CAPTURE -->
      <div class="cap-sec">
        <div class="apl"><div class="pldot"></div><span class="pltext" id="afl">Klasör seçin</span></div>

        <div class="rec-bar" id="recBar">
          <div class="rec-dot"></div>
          <span class="rec-lbl" id="recLbl">Kayıt yapılıyor...</span>
          <button class="btn-stop" onclick="stopAudio()">■ Durdur</button>
        </div>

        <div class="cap-grid">
          <!-- KAMERA: label + hidden input — en güvenilir mobil yöntem -->
          <label class="cbtn cbtn-cam">
            <span class="ci2">📷</span>Kamera
            <input type="file" accept="image/*" capture="environment" multiple onchange="handleFiles(this,'photo')">
          </label>
          <label class="cbtn cbtn-gal">
            <span class="ci2">🖼️</span>Galeri
            <input type="file" accept="image/*" multiple onchange="handleFiles(this,'photo')">
          </label>
          <label class="cbtn cbtn-vid">
            <span class="ci2">🎥</span>Video
            <input type="file" accept="video/*" capture="environment" onchange="handleFiles(this,'video')">
          </label>
          <button class="cbtn cbtn-aud" onclick="doAudio()">
            <span class="ci2">🎙️</span>Ses Kaydet
          </button>
          <button class="cbtn cbtn-not" onclick="openNoteModal()">
            <span class="ci2">📝</span>Not Ekle
          </button>
        </div>

        <div class="media-list" id="mediaList"></div>
      </div>
    </div>

    <div class="rep-footer">
      <button class="btn-zip" onclick="doZip()">⬇ ZIP İNDİR</button>
    </div>
  </div>
</div>

<!-- FOLDER MODAL -->
<div class="overlay" id="folderOverlay">
  <div class="sheet">
    <h3>Yeni Klasör</h3>
    <input class="sheet-inp" id="folderInp" type="text" placeholder="Klasör adı..." maxlength="50" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="sheet-btns">
      <button class="btn-sc" onclick="closeFolderModal()">İptal</button>
      <button class="btn-so" onclick="saveFolder()">Ekle</button>
    </div>
  </div>
</div>

<!-- NOTE MODAL -->
<div class="overlay" id="noteOverlay">
  <div class="sheet">
    <h3>Not Ekle</h3>
    <textarea id="noteTA" placeholder="Notunuzu buraya yazın..."></textarea>
    <div class="sheet-btns">
      <button class="btn-sc" onclick="closeNoteModal()">İptal</button>
      <button class="btn-so" onclick="saveNote()">Kaydet</button>
    </div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<!-- hidden fallback inputs (not used but kept for safety) -->
<input type="file" id="photoInput" accept="image/*" multiple style="display:none">
<input type="file" id="videoInput" accept="video/*" style="display:none">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
'use strict';

/* ── STATE ── */
let custs     = JSON.parse(localStorage.getItem('oncu_v5') || '[]');
let curIdx    = null;
let activeFolder = null;
let mediaRec  = null, audioChunks = [], isRec = false, recTimer = null, recSecs = 0;

function save() { localStorage.setItem('oncu_v5', JSON.stringify(custs)); }

/* ── TOAST ── */
function toast(msg) {
  const t = document.getElementById('toastEl');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('on'), 2600);
}

/* ── UTILS ── */
function ini(n) { return n.split(/[\s_\-]+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?'; }
function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDur(s) { return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
function fmtSize(b) { return b>1048576?(b/1048576).toFixed(1)+'MB':(b/1024).toFixed(0)+'KB'; }
function totalMedia(c) { return Object.values(c.folders||{}).reduce((s,f)=>s+(f.items||[]).length,0); }

/* ── HOME ── */
function renderHome() {
  document.getElementById('custCnt').textContent = custs.length;
  const list = document.getElementById('custList');
  const empty = document.getElementById('emptyState');
  if (!custs.length) { list.innerHTML=''; list.appendChild(empty); return; }
  list.innerHTML = custs.map((c,i) => {
    const tm = totalMedia(c), fc = Object.keys(c.folders||{}).length;
    return `<div class="ccard" id="cc${i}">
      <div class="crow" onclick="toggleCust(${i})">
        <div class="av">${ini(c.name)}</div>
        <div class="ci">
          <div class="cn">${escH(c.name)}</div>
          <div class="cm">${tm} dosya · ${fc} klasör</div>
        </div>
        <span class="caret">▶</span>
      </div>
      <div class="cacts">
        <button class="btn-rpt" onclick="openReport(${i})">📂 Raporu Aç</button>
        <button class="btn-del" onclick="deleteCust(${i})">🗑</button>
      </div>
    </div>`;
  }).join('');
}
function toggleCust(i) { document.getElementById('cc'+i).classList.toggle('op'); }
function addCustomer() {
  const inp = document.getElementById('custInp');
  const name = inp.value.trim();
  if (!name) { toast('Müşteri adı girin'); return; }
  if (custs.find(c=>c.name===name)) { toast('Bu müşteri zaten var'); return; }
  custs.unshift({ name, folders:{}, created:Date.now() });
  save(); inp.value = ''; inp.blur(); renderHome(); toast(name+' eklendi ✓');
}
function deleteCust(i) {
  if (!confirm(`"${custs[i].name}" silinsin mi?`)) return;
  custs.splice(i,1); save(); renderHome();
}

/* ── REPORT ── */
function openReport(i) {
  curIdx = i; activeFolder = null;
  document.getElementById('repName').textContent = custs[i].name;
  document.getElementById('afl').textContent = 'Klasör seçin';
  renderFolders(); renderMedia();
  document.getElementById('sHome').classList.remove('on');
  document.getElementById('sReport').classList.add('on');
  document.getElementById('repScroll').scrollTop = 0;
}
function goHome() {
  if (isRec) stopAudio();
  document.getElementById('sReport').classList.remove('on');
  document.getElementById('sHome').classList.add('on');
  renderHome();
}

/* ── FOLDERS ── */
function renderFolders() {
  const folders = custs[curIdx].folders || {};
  const entries = Object.entries(folders);
  if (!entries.length) {
    document.getElementById('folderList').innerHTML = '<p class="no-f">Klasör yok — "+ Yeni Klasör" ekleyin.</p>';
    return;
  }
  document.getElementById('folderList').innerHTML = entries.map(([id,f]) => {
    const n = (f.items||[]).length, isA = activeFolder===id, has = n>0;
    return `<div class="fitem ${isA?'act':''} ${has?'fil':''}">
      <div class="fbody" onclick="selFolder('${id}','${escH(f.name)}')">
        <div class="fdot"></div>
        <span class="fnm">${escH(f.name)}</span>
        <span class="fcnt">${has?'✓ '+n:'—'}</span>
        ${isA?'<span class="ftag">AKTİF</span>':''}
      </div>
      <button class="fdel" onclick="delFolder('${id}')">×</button>
    </div>`;
  }).join('');
}
function selFolder(id, name) {
  activeFolder = id;
  document.getElementById('afl').textContent = name;
  renderFolders(); renderMedia();
}
function delFolder(id) {
  const f = custs[curIdx].folders[id];
  if ((f.items||[]).length > 0 && !confirm('Klasördeki tüm dosyalar silinecek. Devam?')) return;
  delete custs[curIdx].folders[id];
  if (activeFolder===id) { activeFolder=null; document.getElementById('afl').textContent='Klasör seçin'; }
  save(); renderFolders(); renderMedia();
}

/* FOLDER MODAL */
function openFolderModal() {
  document.getElementById('folderInp').value = '';
  document.getElementById('folderOverlay').classList.add('on');
  setTimeout(() => document.getElementById('folderInp').focus(), 150);
}
function closeFolderModal() {
  document.getElementById('folderOverlay').classList.remove('on');
  document.getElementById('folderInp').blur();
}
function saveFolder() {
  const name = document.getElementById('folderInp').value.trim();
  if (!name) { toast('Klasör adı girin'); return; }
  if (!custs[curIdx].folders) custs[curIdx].folders = {};
  const id = 'f' + Date.now();
  custs[curIdx].folders[id] = { name, items:[] };
  save(); closeFolderModal(); renderFolders(); selFolder(id, name);
  toast(name+' klasörü eklendi ✓');
}

/* ── MEDIA RENDER ── */
function renderMedia() {
  const ml = document.getElementById('mediaList');
  if (!activeFolder || !custs[curIdx]?.folders[activeFolder]) { ml.innerHTML=''; return; }
  const items = custs[curIdx].folders[activeFolder].items || [];
  if (!items.length) { ml.innerHTML='<p class="media-empty">Bu klasörde henüz dosya yok</p>'; return; }

  const BG = { photo:'#dceeff', video:'#fde8e8', audio:'#fef3dc', note:'#dff5ec' };
  const LBL = { photo:'Fotoğraf', video:'Video', audio:'Ses Kaydı', note:'Not' };

  ml.innerHTML = items.map((m,i) => {
    /* thumbnail / icon */
    let thumb = '';
    if (m.type==='photo') {
      thumb = `<img class="mthumb" src="${m.data}" onclick="toggleExp(${i})" loading="lazy" alt="">`;
    } else {
      const icons = { video:'🎥', audio:'🎙️', note:'📝' };
      thumb = `<div class="micon" style="background:${BG[m.type]}" onclick="toggleExp(${i})">${icons[m.type]}</div>`;
    }

    /* preview content */
    let preview = '';
    if (m.type==='photo') {
      preview = `<img src="${m.data}" alt="" style="width:100%;border-radius:10px;display:block;max-height:340px;object-fit:contain;background:#111">`;
    } else if (m.type==='video') {
      preview = `<video src="${m.data}" controls playsinline webkit-playsinline style="width:100%;border-radius:10px;display:block;max-height:280px;background:#000"></video>`;
    } else if (m.type==='audio') {
      preview = `<audio src="${m.data}" controls style="width:100%;display:block;margin:4px 0"></audio>`;
    } else if (m.type==='note') {
      preview = `<div class="note-txt">${escH(m.text)}</div>`;
    }

    const hint = m.type==='note' ? '' : `<span class="expand-hint">· dokunarak aç/kapat</span>`;

    return `<div class="mitem" id="mi${i}">
      <div class="mitem-row">
        ${thumb}
        <div class="minfo">
          <div class="mname">${m.type==='note' ? escH(m.text.slice(0,40))+'…' : escH(m.name)}</div>
          <div class="msub">${LBL[m.type]}${m.dur?' · '+m.dur:''}${m.size?' · '+m.size:''} ${hint}</div>
        </div>
        <button class="mdel" onclick="delMedia(${i})">×</button>
      </div>
      <div class="mpreview">${preview}</div>
    </div>`;
  }).join('');
}

function toggleExp(i) {
  const el = document.getElementById('mi'+i);
  if (!el) return;
  el.classList.toggle('exp');
  /* video/audio: pause when closing */
  if (!el.classList.contains('exp')) {
    el.querySelectorAll('video,audio').forEach(m => { try { m.pause(); } catch(e){} });
  }
}

function delMedia(idx) {
  custs[curIdx].folders[activeFolder].items.splice(idx,1);
  save(); renderFolders(); renderMedia();
}
function pushItem(item) {
  if (!activeFolder) { toast('Önce bir klasör seçin'); return; }
  custs[curIdx].folders[activeFolder].items.push(item);
  save(); renderFolders(); renderMedia();
}
function checkFolder() {
  if (!activeFolder) { toast('Önce bir klasör seçin'); return false; }
  return true;
}

/* ── FILE HANDLER (photo + video) ── */
function handleFiles(inp, type) {
  if (!activeFolder) {
    toast('Önce bir klasör seçin');
    inp.value = ''; return;
  }
  const files = Array.from(inp.files);
  if (!files.length) return;
  let done = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      if (type === 'photo') {
        pushItem({ type:'photo', name: file.name || 'foto_'+Date.now()+'.jpg', data: ev.target.result });
      } else {
        pushItem({ type:'video', name: file.name || 'video_'+Date.now()+'.mp4', data: ev.target.result, size: fmtSize(file.size) });
      }
      done++;
      if (done === files.length) toast(done + (type==='photo' ? ' fotoğraf' : ' video') + ' eklendi ✓');
    };
    reader.readAsDataURL(file);
  });
  inp.value = '';
}

/* ── AUDIO ── */
async function doAudio() {
  if (!checkFolder()) return;
  if (isRec) { stopAudio(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    audioChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
    mediaRec = new MediaRecorder(stream, { mimeType });
    mediaRec.ondataavailable = e => { if (e.data.size>0) audioChunks.push(e.data); };
    mediaRec.onstop = () => {
      const blob = new Blob(audioChunks, { type: mimeType });
      const ext = mimeType.includes('mp4') ? 'm4a' : 'webm';
      const reader = new FileReader();
      reader.onload = ev => {
        const name = 'ses_'+new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')+'.'+ext;
        pushItem({ type:'audio', name, data: ev.target.result, dur: fmtDur(recSecs) });
        toast('Ses kaydı eklendi ✓');
      };
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(t=>t.stop());
    };
    mediaRec.start();
    isRec = true; recSecs = 0;
    document.getElementById('recBar').classList.add('on');
    recTimer = setInterval(() => {
      recSecs++;
      document.getElementById('recLbl').textContent = '● Kayıt: ' + fmtDur(recSecs);
    }, 1000);
  } catch(err) {
    toast('Mikrofon erişimi reddedildi');
  }
}
function stopAudio() {
  if (!isRec) return;
  isRec = false; clearInterval(recTimer);
  try { mediaRec.stop(); } catch(e){}
  document.getElementById('recBar').classList.remove('on');
  document.getElementById('recLbl').textContent = 'Kayıt yapılıyor...';
}

/* ── NOTE ── */
function openNoteModal() {
  if (!checkFolder()) return;
  document.getElementById('noteTA').value = '';
  document.getElementById('noteOverlay').classList.add('on');
  setTimeout(() => document.getElementById('noteTA').focus(), 150);
}
function closeNoteModal() {
  document.getElementById('noteOverlay').classList.remove('on');
  document.getElementById('noteTA').blur();
}
function saveNote() {
  const text = document.getElementById('noteTA').value.trim();
  if (!text) { toast('Not boş olamaz'); return; }
  pushItem({ type:'note', text, ts: new Date().toLocaleString('tr-TR') });
  closeNoteModal(); toast('Not kaydedildi ✓');
}

/* ── ZIP ── */
async function doZip() {
  const c = custs[curIdx];
  if (totalMedia(c) === 0) { toast('Önce dosya ekleyin'); return; }
  toast('ZIP hazırlanıyor...');
  try {
    const zip = new JSZip();
    const safeName = c.name.replace(/[^\w\u00C0-\u024F\s\-]/g,'_');
    const root = zip.folder(safeName);
    let summary = `ÖNCÜ RAPOR\nMüşteri: ${c.name}\nTarih: ${new Date().toLocaleDateString('tr-TR')}\nSaat: ${new Date().toLocaleTimeString('tr-TR')}\n`;
    for (const [,f] of Object.entries(c.folders||{})) {
      const items = f.items||[];
      if (!items.length) continue;
      const zf = root.folder(f.name.replace(/[^\w\u00C0-\u024F\s\-]/g,'_'));
      summary += `\n[ ${f.name} ] — ${items.length} dosya\n`;
      let pi=1,vi=1,ai=1,notes='';
      for (const m of items) {
        const b64 = m.data ? m.data.split(',')[1] : null;
        if (m.type==='photo') {
          const ext = m.data.startsWith('data:image/png')?'png':'jpg';
          zf.file(`foto_${String(pi).padStart(2,'0')}.${ext}`, b64, {base64:true});
          summary += `  - foto_${String(pi++).padStart(2,'0')}.${ext}\n`;
        } else if (m.type==='video') {
          zf.file(`video_${String(vi).padStart(2,'0')}.mp4`, b64, {base64:true});
          summary += `  - video_${String(vi++).padStart(2,'0')}.mp4\n`;
        } else if (m.type==='audio') {
          const ext = m.name.endsWith('m4a')?'m4a':'webm';
          zf.file(`ses_${String(ai).padStart(2,'0')}.${ext}`, b64, {base64:true});
          summary += `  - ses_${String(ai++).padStart(2,'0')}.${ext} (${m.dur||''})\n`;
        } else if (m.type==='note') {
          notes += `[${m.ts||''}]\n${m.text}\n\n`;
          summary += `  - Not: "${m.text.slice(0,40)}"\n`;
        }
      }
      if (notes) zf.file('notlar.txt', notes);
    }
    root.file('rapor_ozeti.txt', summary);
    const blob = await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${safeName}_${new Date().toISOString().slice(0,10)}.zip`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    toast('ZIP indirildi ✓');
  } catch(err) { toast('Hata: '+err.message); }
}

/* ── KEYBOARD ── */
document.getElementById('custInp').addEventListener('keydown', e => { if(e.key==='Enter') addCustomer(); });
document.getElementById('folderInp').addEventListener('keydown', e => { if(e.key==='Enter') saveFolder(); });
document.getElementById('noteTA').addEventListener('keydown', e => { if(e.key==='Enter'&&e.ctrlKey) saveNote(); });

/* ── OVERLAY CLOSE ON BG TAP ── */
document.getElementById('folderOverlay').addEventListener('click', function(e) { if(e.target===this) closeFolderModal(); });
document.getElementById('noteOverlay').addEventListener('click', function(e) { if(e.target===this) closeNoteModal(); });

/* ── LABEL FOLDER CHECK ── */
document.querySelectorAll('.cbtn input[type=file]').forEach(inp => {
  inp.addEventListener('click', e => {
    if (!activeFolder) { e.preventDefault(); toast('Önce bir klasör seçin'); }
  });
});

/* ── INIT ── */
renderHome();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
