<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f2540">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Öncü Rapor">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Öncü Rapor</title>
<style>
:root{
  --nv:#0f2540;--nv2:#1a3a5c;--nv3:#234d78;
  --green:#25d366;--safe:#1d9e75;--danger:#e04040;
  --bg:#f0ede8;--card:#fff;--muted:#8496a9;--bdr:#e2ddd7;--txt:#1a2a3a;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font-family:-apple-system,'Helvetica Neue',system-ui,sans-serif;-webkit-font-smoothing:antialiased}

.app{display:flex;flex-direction:column;height:100%;height:100dvh}
.hdr{background:var(--nv);padding:var(--sat) 0 0;flex-shrink:0}
.hdr-inner{display:flex;align-items:center;gap:12px;padding:12px 16px 14px}
.hdr-logo{width:38px;height:38px;border-radius:9px;background:#fff;object-fit:contain;padding:2px;flex-shrink:0}
.hdr-text h1{font-size:17px;font-weight:700;color:#fff}
.hdr-text p{font-size:11px;color:#7ab8e8;margin-top:1px}

.scr{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.scr.on{display:flex}

/* HOME */
.home-top{background:var(--nv);padding:0 16px 16px;flex-shrink:0}
.add-row{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:14px;
  display:flex;align-items:center;gap:10px;padding:10px 10px 10px 14px}
.add-inp{flex:1;background:transparent;border:none;font-size:15px;color:#fff;
  font-family:inherit;outline:none;min-width:0}
.add-inp::placeholder{color:rgba(255,255,255,.35)}
.btn-add{background:var(--green);border:none;border-radius:10px;padding:0 18px;
  font-size:20px;font-weight:700;color:#fff;cursor:pointer;height:44px;min-width:44px;flex-shrink:0}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px;
  padding-bottom:calc(var(--sab) + 20px)}
.sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-lbl{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase}
.cnt-pill{background:var(--nv);color:#7ab8e8;font-size:11px;font-weight:700;border-radius:20px;padding:3px 9px}

.empty{text-align:center;padding:52px 24px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty p{font-size:15px;line-height:1.5}

.ccard{background:var(--card);border-radius:16px;border:1px solid var(--bdr);margin-bottom:10px;overflow:hidden}
.crow{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;min-height:68px;user-select:none}
.av{width:44px;height:44px;border-radius:11px;background:var(--nv);display:flex;align-items:center;
  justify-content:center;font-size:15px;font-weight:700;color:#7ab8e8;flex-shrink:0}
.ci{flex:1;min-width:0}
.cn{font-size:15px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cm{font-size:12px;color:var(--muted);margin-top:3px}
.caret{font-size:12px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.ccard.op .caret{transform:rotate(90deg)}
.cacts{display:none;border-top:1px solid var(--bdr);padding:12px 14px;gap:8px}
.ccard.op .cacts{display:flex}
.btn-rpt{flex:1;background:var(--nv);border:none;border-radius:12px;padding:13px;font-size:14px;
  font-weight:600;color:#fff;cursor:pointer;min-height:48px;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-del{background:#fff;border:1.5px solid var(--danger);border-radius:12px;padding:13px 16px;
  font-size:16px;color:var(--danger);cursor:pointer;min-height:48px;min-width:48px;
  display:flex;align-items:center;justify-content:center}

/* REPORT */
.rep-nav{background:var(--nv2);display:flex;align-items:center;gap:10px;padding:11px 16px 13px;flex-shrink:0}
.btn-back{background:rgba(255,255,255,.12);border:none;border-radius:10px;padding:10px 14px;
  color:#fff;font-size:14px;font-weight:600;cursor:pointer;min-height:44px}
.rep-nm{flex:1;font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.rep-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--sab) + 80px)}

/* FOLDERS */
.folders-sec{padding:14px 16px 8px}
.ftop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ftop h3{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase}
.btn-nf{background:var(--nv);border:none;border-radius:10px;padding:9px 16px;
  font-size:13px;font-weight:700;color:#fff;cursor:pointer;min-height:40px}

.flist{display:flex;flex-direction:column;gap:6px}
.fitem{background:var(--card);border-radius:13px;border:1.5px solid var(--bdr);
  display:flex;align-items:stretch;overflow:hidden;min-height:52px}
.fitem.act{border-color:var(--nv);background:#ecf2fb}
.fitem.fil{border-color:var(--safe)}
.fbody{flex:1;display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;min-width:0;user-select:none}
.fdot{width:10px;height:10px;border-radius:50%;background:var(--bdr);flex-shrink:0}
.fitem.act .fdot{background:var(--nv)}
.fitem.fil .fdot{background:var(--safe)}
.fnm{font-size:14px;font-weight:600;color:var(--txt);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fcnt{font-size:12px;color:var(--muted);flex-shrink:0}
.fitem.fil .fcnt{color:var(--safe);font-weight:600}
.ftag{font-size:9px;font-weight:800;background:var(--nv);color:#fff;border-radius:4px;padding:2px 6px;flex-shrink:0}
.fdel{background:#fff5f5;border:none;border-left:1px solid var(--bdr);padding:0 18px;
  cursor:pointer;color:var(--danger);font-size:20px;display:flex;align-items:center;justify-content:center;min-width:52px}
.no-f{font-size:13px;color:var(--muted);text-align:center;padding:12px 4px}

/* CAPTURE */
.cap-sec{padding:12px 16px 0}
.apl{display:inline-flex;align-items:center;gap:7px;background:var(--nv);border-radius:20px;
  padding:8px 14px;font-size:13px;font-weight:600;color:#fff;margin-bottom:14px;max-width:100%;overflow:hidden}
.pldot{width:8px;height:8px;background:var(--green);border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.pltext{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.rec-bar{display:none;background:#fde8e8;border-radius:12px;padding:12px 14px;
  align-items:center;gap:10px;margin-bottom:14px;border:1px solid #f09595}
.rec-bar.on{display:flex}
.rec-dot{width:10px;height:10px;border-radius:50%;background:var(--danger);animation:blink 1s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.rec-lbl{flex:1;font-size:13px;font-weight:600;color:var(--danger)}
.btn-stop{background:var(--danger);border:none;border-radius:8px;padding:9px 14px;
  font-size:13px;font-weight:700;color:#fff;cursor:pointer;min-height:40px}

.cap-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
/* Label butonlar — mobilde en güvenilir yöntem */
.cbtn{border:none;border-radius:14px;padding:16px 10px;font-size:13px;font-weight:700;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;
  min-height:80px;user-select:none;-webkit-user-select:none;position:relative}
.cbtn:active{opacity:.75}
.cbtn input[type=file]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
.cbtn-cam{background:#dceeff;color:#0c447c}
.cbtn-gal{background:#e8f4ff;color:#0c447c}
.cbtn-vid{background:#fde8e8;color:#791f1f}
.cbtn-aud{background:#fef3dc;color:#633806}
.cbtn-not{background:#dff5ec;color:#085041;grid-column:span 2}
.cbtn-icon{font-size:28px;line-height:1;pointer-events:none}

/* MEDIA */
.mlist{display:flex;flex-direction:column;gap:8px}
.mempty{font-size:13px;color:var(--muted);text-align:center;padding:20px}

.mitem{background:var(--card);border-radius:13px;border:1px solid var(--bdr);overflow:hidden}
.mrow{display:flex;align-items:center;gap:10px;padding:10px 12px;min-height:64px}
.mthumb{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0;
  cursor:pointer;display:block;background:#e8e4de}
.micon{width:56px;height:56px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:26px;flex-shrink:0;cursor:pointer}
.minfo{flex:1;min-width:0}
.mname{font-size:13px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msub{font-size:11px;color:var(--muted);margin-top:3px}
.mdel{background:none;border:none;color:var(--danger);cursor:pointer;font-size:22px;
  padding:6px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.mprev{display:none;padding:0 10px 10px}
.mitem.exp .mprev{display:block}
.mprev img{width:100%;border-radius:10px;display:block;background:#111;
  max-height:360px;object-fit:contain}
.mprev video{width:100%;border-radius:10px;display:block;background:#000;max-height:280px}
.mprev audio{width:100%;display:block;margin:4px 0}
.note-body{font-size:14px;line-height:1.55;color:var(--txt);padding:4px 2px;white-space:pre-wrap}

/* FOOTER */
.rep-footer{background:var(--card);border-top:1px solid var(--bdr);
  padding:12px 16px;padding-bottom:calc(var(--sab) + 12px);flex-shrink:0}
.btn-zip{width:100%;background:var(--nv);border:none;border-radius:14px;padding:15px;
  font-size:15px;font-weight:800;color:#fff;cursor:pointer;min-height:52px;
  display:flex;align-items:center;justify-content:center;gap:9px}
.btn-zip:active{background:var(--nv3)}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:300;align-items:flex-end;justify-content:center}
.modal-bg.on{display:flex}
.modal-sheet{background:var(--card);border-radius:22px 22px 0 0;
  padding:22px 20px;padding-bottom:calc(var(--sab) + 22px);width:100%;max-width:480px}
.modal-sheet h3{font-size:17px;font-weight:700;margin-bottom:16px;color:var(--txt)}
.modal-inp{width:100%;border:1.5px solid var(--bdr);border-radius:12px;padding:14px;
  font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none;
  background:#fff;color:var(--txt);margin-bottom:14px}
.modal-inp:focus{border-color:var(--nv)}
.modal-ta{width:100%;border:1.5px solid var(--bdr);border-radius:12px;padding:14px;
  font-size:15px;font-family:inherit;outline:none;resize:none;min-height:140px;
  -webkit-appearance:none;background:#fff;color:var(--txt);margin-bottom:14px}
.modal-ta:focus{border-color:var(--nv)}
.modal-btns{display:flex;gap:10px}
.btn-cancel{flex:1;background:#f0ede8;border:none;border-radius:12px;padding:14px;
  font-size:15px;font-weight:600;cursor:pointer;min-height:50px;color:var(--txt)}
.btn-ok{flex:1;background:var(--nv);border:none;border-radius:12px;padding:14px;
  font-size:15px;font-weight:700;color:#fff;cursor:pointer;min-height:50px}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--sab) + 90px);left:50%;
  transform:translateX(-50%) translateY(14px);
  background:rgba(15,37,64,.95);color:#fff;padding:12px 22px;border-radius:24px;
  font-size:14px;font-weight:500;opacity:0;transition:opacity .25s,transform .25s;
  white-space:nowrap;z-index:500;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="hdr-inner">
      <img class="hdr-logo" src="icon-192.png" alt=""
        onerror="this.outerHTML='<div style=\'width:38px;height:38px;border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#0f2540;flex-shrink:0\'>ÖNCÜ</div>'">
      <div class="hdr-text"><h1>Öncü Rapor</h1><p>Saha Fotoğraf Sistemi</p></div>
    </div>
  </div>

  <!-- HOME -->
  <div class="scr on" id="sHome">
    <div class="home-top">
      <div class="add-row">
        <input class="add-inp" id="custInp" type="text" placeholder="Müşteri adı ekle..."
          maxlength="60" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="btn-add" id="btnAdd">+</button>
      </div>
    </div>
    <div class="scroll">
      <div class="sec-row">
        <span class="sec-lbl">Müşteriler</span>
        <span class="cnt-pill" id="custCnt">0</span>
      </div>
      <div id="custList"></div>
    </div>
  </div>

  <!-- REPORT -->
  <div class="scr" id="sReport">
    <div class="rep-nav">
      <button class="btn-back" id="btnBack">← Geri</button>
      <span class="rep-nm" id="repName"></span>
    </div>
    <div class="rep-scroll" id="repScroll">
      <div class="folders-sec">
        <div class="ftop">
          <h3>Klasörler</h3>
          <button class="btn-nf" id="btnNewFolder">+ Yeni Klasör</button>
        </div>
        <div class="flist" id="folderList"></div>
      </div>
      <div class="cap-sec">
        <div class="apl"><div class="pldot"></div><span class="pltext" id="afl">Klasör seçin</span></div>
        <div class="rec-bar" id="recBar">
          <div class="rec-dot"></div>
          <span class="rec-lbl" id="recLbl">Kayıt yapılıyor...</span>
          <button class="btn-stop" id="btnStop">■ Durdur</button>
        </div>
        <div class="cap-grid">
          <label class="cbtn cbtn-cam">
            <span class="cbtn-icon">📷</span>Kamera
            <input type="file" id="inpCam" accept="image/*" capture="environment" multiple>
          </label>
          <label class="cbtn cbtn-gal">
            <span class="cbtn-icon">🖼️</span>Galeri
            <input type="file" id="inpGal" accept="image/*" multiple>
          </label>
          <label class="cbtn cbtn-vid">
            <span class="cbtn-icon">🎥</span>Video
            <input type="file" id="inpVid" accept="video/*" capture="environment">
          </label>
          <button class="cbtn cbtn-aud" id="btnAud">
            <span class="cbtn-icon">🎙️</span>Ses Kaydet
          </button>
          <button class="cbtn cbtn-not" id="btnNote">
            <span class="cbtn-icon">📝</span>Not Ekle
          </button>
        </div>
        <div class="mlist" id="mediaList"></div>
      </div>
    </div>
    <div class="rep-footer">
      <button class="btn-zip" id="btnZip">⬇ ZIP İNDİR</button>
    </div>
  </div>
</div>

<!-- FOLDER MODAL -->
<div class="modal-bg" id="folderModal">
  <div class="modal-sheet">
    <h3>Yeni Klasör</h3>
    <input class="modal-inp" id="folderInp" type="text" placeholder="Klasör adı..."
      maxlength="50" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="modal-btns">
      <button class="btn-cancel" id="btnFolderCancel">İptal</button>
      <button class="btn-ok" id="btnFolderOk">Ekle</button>
    </div>
  </div>
</div>

<!-- NOTE MODAL -->
<div class="modal-bg" id="noteModal">
  <div class="modal-sheet">
    <h3>Not Ekle</h3>
    <textarea class="modal-ta" id="noteTA" placeholder="Notunuzu buraya yazın..."></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" id="btnNoteCancel">İptal</button>
      <button class="btn-ok" id="btnNoteOk">Kaydet</button>
    </div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
'use strict';
/* ─── STATE ─── */
let custs = JSON.parse(localStorage.getItem('oncu_v6') || '[]');
let curIdx = null, activeFolder = null;
let mediaRec = null, audioChunks = [], isRec = false, recTimer = null, recSecs = 0;

function save() { localStorage.setItem('oncu_v6', JSON.stringify(custs)); }

/* ─── TOAST ─── */
let _toastT;
function toast(msg) {
  const t = document.getElementById('toastEl');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => t.classList.remove('on'), 2600);
}

/* ─── UTILS ─── */
function ini(n) { return n.split(/[\s_\-]+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDur(s) { return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
function fmtSize(b) { return b>1048576?(b/1048576).toFixed(1)+'MB':(b/1024).toFixed(0)+'KB'; }
function totalMedia(c) { return Object.values(c.folders||{}).reduce((s,f)=>s+(f.items||[]).length,0); }
function getCust() { return custs[curIdx]; }
function getFolder() { return getCust()?.folders?.[activeFolder]; }

/* ─── HOME ─── */
function renderHome() {
  document.getElementById('custCnt').textContent = custs.length;
  const el = document.getElementById('custList');
  if (!custs.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">👥</div><p>Henüz müşteri yok.<br>Yukarıdan ekleyin.</p></div>`;
    return;
  }
  el.innerHTML = custs.map((c,i) => {
    const tm=totalMedia(c), fc=Object.keys(c.folders||{}).length;
    return `<div class="ccard" id="cc${i}">
      <div class="crow" data-idx="${i}">
        <div class="av">${ini(c.name)}</div>
        <div class="ci"><div class="cn">${esc(c.name)}</div><div class="cm">${tm} dosya · ${fc} klasör</div></div>
        <span class="caret">▶</span>
      </div>
      <div class="cacts">
        <button class="btn-rpt" data-open="${i}">📂 Raporu Aç</button>
        <button class="btn-del" data-del="${i}">🗑</button>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('custList').addEventListener('click', e => {
  const row = e.target.closest('.crow');
  const open = e.target.closest('[data-open]');
  const del = e.target.closest('[data-del]');
  if (del) { deleteCust(+del.dataset.del); return; }
  if (open) { openReport(+open.dataset.open); return; }
  if (row) { document.getElementById('cc'+row.dataset.idx).classList.toggle('op'); }
});

function addCustomer() {
  const inp = document.getElementById('custInp');
  const name = inp.value.trim();
  if (!name) { toast('Müşteri adı girin'); return; }
  if (custs.find(c=>c.name===name)) { toast('Bu müşteri zaten var'); return; }
  custs.unshift({ name, folders:{}, created:Date.now() });
  save(); inp.value=''; inp.blur(); renderHome(); toast(name+' eklendi ✓');
}
function deleteCust(i) {
  if (!confirm(`"${custs[i].name}" silinsin mi?`)) return;
  custs.splice(i,1); save(); renderHome();
}

document.getElementById('btnAdd').addEventListener('click', addCustomer);
document.getElementById('custInp').addEventListener('keydown', e => { if(e.key==='Enter') addCustomer(); });

/* ─── REPORT ─── */
function openReport(i) {
  curIdx = i; activeFolder = null;
  document.getElementById('repName').textContent = custs[i].name;
  document.getElementById('afl').textContent = 'Klasör seçin';
  renderFolders(); renderMedia();
  document.getElementById('sHome').classList.remove('on');
  document.getElementById('sReport').classList.add('on');
  document.getElementById('repScroll').scrollTop = 0;
}
function goHome() {
  if (isRec) stopAudio();
  document.getElementById('sReport').classList.remove('on');
  document.getElementById('sHome').classList.add('on');
  renderHome();
}
document.getElementById('btnBack').addEventListener('click', goHome);

/* ─── FOLDERS ─── */
function renderFolders() {
  const folders = getCust().folders || {};
  const entries = Object.entries(folders);
  const el = document.getElementById('folderList');
  if (!entries.length) {
    el.innerHTML = '<p class="no-f">Klasör yok — "+ Yeni Klasör" ekleyin.</p>';
    return;
  }
  el.innerHTML = entries.map(([id,f]) => {
    const n=(f.items||[]).length, isA=activeFolder===id, has=n>0;
    return `<div class="fitem ${isA?'act':''} ${has?'fil':''}">
      <div class="fbody" data-fid="${id}" data-fname="${esc(f.name)}">
        <div class="fdot"></div>
        <span class="fnm">${esc(f.name)}</span>
        <span class="fcnt">${has?'✓ '+n:'—'}</span>
        ${isA?'<span class="ftag">AKTİF</span>':''}
      </div>
      <button class="fdel" data-fdel="${id}">×</button>
    </div>`;
  }).join('');
}

document.getElementById('folderList').addEventListener('click', e => {
  const body = e.target.closest('[data-fid]');
  const del  = e.target.closest('[data-fdel]');
  if (del)  { delFolder(del.dataset.fdel); return; }
  if (body) { selFolder(body.dataset.fid, body.dataset.fname); }
});

function selFolder(id, name) {
  activeFolder = id;
  document.getElementById('afl').textContent = name;
  renderFolders(); renderMedia();
}
function delFolder(id) {
  const f = getCust().folders[id];
  if ((f.items||[]).length>0 && !confirm('Klasördeki tüm dosyalar silinecek. Devam?')) return;
  delete getCust().folders[id];
  if (activeFolder===id) { activeFolder=null; document.getElementById('afl').textContent='Klasör seçin'; }
  save(); renderFolders(); renderMedia();
}

/* FOLDER MODAL — flag ile çift tetiklenme engelleniyor */
let _folderBusy = false;
function openFolderModal() {
  if (_folderBusy) return;
  document.getElementById('folderInp').value = '';
  document.getElementById('folderModal').classList.add('on');
  setTimeout(() => document.getElementById('folderInp').focus(), 120);
}
function closeFolderModal() {
  document.getElementById('folderModal').classList.remove('on');
  document.getElementById('folderInp').blur();
}
function saveFolder() {
  if (_folderBusy) return;
  const name = document.getElementById('folderInp').value.trim();
  if (!name) { toast('Klasör adı girin'); return; }
  _folderBusy = true;
  closeFolderModal();
  if (!getCust().folders) getCust().folders = {};
  const id = 'f' + Date.now();
  getCust().folders[id] = { name, items:[] };
  save(); renderFolders(); selFolder(id, name);
  toast(name+' eklendi ✓');
  setTimeout(() => { _folderBusy = false; }, 400);
}

document.getElementById('btnNewFolder').addEventListener('click', openFolderModal);
document.getElementById('btnFolderOk').addEventListener('click', saveFolder);
document.getElementById('btnFolderCancel').addEventListener('click', closeFolderModal);
document.getElementById('folderInp').addEventListener('keydown', e => { if(e.key==='Enter') saveFolder(); });
document.getElementById('folderModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeFolderModal(); });

/* ─── MEDIA RENDER ─── */
function renderMedia() {
  const ml = document.getElementById('mediaList');
  const folder = getFolder();
  if (!folder) { ml.innerHTML=''; return; }
  const items = folder.items || [];
  if (!items.length) { ml.innerHTML='<p class="mempty">Bu klasörde henüz dosya yok</p>'; return; }

  const BG  = { photo:'#dceeff', video:'#fde8e8', audio:'#fef3dc', note:'#dff5ec' };
  const LBL = { photo:'Fotoğraf', video:'Video', audio:'Ses Kaydı', note:'Not' };
  const ICO = { video:'🎥', audio:'🎙️', note:'📝' };

  ml.innerHTML = items.map((m,i) => {
    const thumb = m.type==='photo'
      ? `<img class="mthumb" src="${m.data}" data-expand="${i}" loading="lazy" decoding="async" alt="">`
      : `<div class="micon" style="background:${BG[m.type]}" data-expand="${i}">${ICO[m.type]}</div>`;

    let prev = '';
    if (m.type==='photo')       prev = `<img src="${m.data}" alt="" style="width:100%;border-radius:10px;display:block;max-height:360px;object-fit:contain;background:#111">`;
    else if (m.type==='video')  prev = `<video src="${m.data}" controls playsinline webkit-playsinline style="width:100%;border-radius:10px;display:block;max-height:280px;background:#000"></video>`;
    else if (m.type==='audio')  prev = `<audio src="${m.data}" controls style="width:100%;display:block;margin:4px 0"></audio>`;
    else if (m.type==='note')   prev = `<div class="note-body">${esc(m.text)}</div>`;

    const sub = [LBL[m.type], m.dur, m.size].filter(Boolean).join(' · ');

    return `<div class="mitem" id="mi${i}">
      <div class="mrow">
        ${thumb}
        <div class="minfo">
          <div class="mname">${m.type==='note'?esc(m.text.slice(0,50)):esc(m.name)}</div>
          <div class="msub">${sub}</div>
        </div>
        <button class="mdel" data-del="${i}">×</button>
      </div>
      <div class="mprev">${prev}</div>
    </div>`;
  }).join('');
}

/* delegated events for media list */
document.getElementById('mediaList').addEventListener('click', e => {
  const del = e.target.closest('[data-del]');
  const exp = e.target.closest('[data-expand]');
  if (del) { delMedia(+del.dataset.del); return; }
  if (exp) { toggleExp(+exp.dataset.expand); }
});

function toggleExp(i) {
  const el = document.getElementById('mi'+i);
  if (!el) return;
  const opening = !el.classList.contains('exp');
  el.classList.toggle('exp');
  if (!opening) {
    el.querySelectorAll('video,audio').forEach(m => { try{m.pause();}catch(e){} });
  }
}
function delMedia(idx) {
  getFolder().items.splice(idx,1);
  save(); renderFolders(); renderMedia();
}
function pushItem(item) {
  if (!activeFolder) { toast('Önce bir klasör seçin'); return false; }
  getFolder().items.push(item);
  save(); renderFolders(); renderMedia();
  return true;
}
function chkFolder() {
  if (!activeFolder) { toast('Önce bir klasör seçin'); return false; }
  return true;
}

/* ─── FILE INPUTS ─── */
function readFiles(inp, type) {
  if (!chkFolder()) { inp.value=''; return; }
  const files = Array.from(inp.files);
  if (!files.length) return;
  let done = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const item = type==='photo'
        ? { type:'photo', name:file.name||'foto_'+Date.now()+'.jpg', data:ev.target.result }
        : { type:'video', name:file.name||'video_'+Date.now()+'.mp4', data:ev.target.result, size:fmtSize(file.size) };
      pushItem(item);
      if (++done===files.length) toast(done+(type==='photo'?' fotoğraf':' video')+' eklendi ✓');
    };
    reader.readAsDataURL(file);
  });
  inp.value = '';
}

document.getElementById('inpCam').addEventListener('change', function(){ readFiles(this,'photo'); });
document.getElementById('inpGal').addEventListener('change', function(){ readFiles(this,'photo'); });
document.getElementById('inpVid').addEventListener('change', function(){ readFiles(this,'video'); });

/* folder check before opening file picker */
['inpCam','inpGal','inpVid'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (!activeFolder) { e.preventDefault(); toast('Önce bir klasör seçin'); }
  });
});

/* ─── AUDIO ─── */
document.getElementById('btnAud').addEventListener('click', doAudio);
document.getElementById('btnStop').addEventListener('click', stopAudio);

async function doAudio() {
  if (!chkFolder()) return;
  if (isRec) { stopAudio(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    audioChunks = [];
    const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
    mediaRec = new MediaRecorder(stream, { mimeType:mime });
    mediaRec.ondataavailable = e => { if(e.data.size>0) audioChunks.push(e.data); };
    mediaRec.onstop = () => {
      const blob = new Blob(audioChunks, { type:mime });
      const ext  = mime.includes('mp4')?'m4a':'webm';
      const reader = new FileReader();
      reader.onload = ev => {
        const name = 'ses_'+new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')+'.'+ext;
        pushItem({ type:'audio', name, data:ev.target.result, dur:fmtDur(recSecs) });
        toast('Ses kaydı eklendi ✓');
      };
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(t=>t.stop());
    };
    mediaRec.start();
    isRec=true; recSecs=0;
    document.getElementById('recBar').classList.add('on');
    recTimer = setInterval(() => {
      recSecs++;
      document.getElementById('recLbl').textContent = '● Kayıt: '+fmtDur(recSecs);
    }, 1000);
  } catch(e) { toast('Mikrofon erişimi reddedildi'); }
}
function stopAudio() {
  if (!isRec) return;
  isRec=false; clearInterval(recTimer);
  try { mediaRec.stop(); } catch(e){}
  document.getElementById('recBar').classList.remove('on');
  document.getElementById('recLbl').textContent = 'Kayıt yapılıyor...';
}

/* ─── NOTE MODAL — flag ile çift tetiklenme engelleniyor ─── */
let _noteBusy = false;
function openNoteModal() {
  if (!chkFolder()) return;
  if (_noteBusy) return;
  document.getElementById('noteTA').value = '';
  document.getElementById('noteModal').classList.add('on');
  setTimeout(() => document.getElementById('noteTA').focus(), 120);
}
function closeNoteModal() {
  document.getElementById('noteModal').classList.remove('on');
  document.getElementById('noteTA').blur();
}
function saveNote() {
  if (_noteBusy) return;
  const text = document.getElementById('noteTA').value.trim();
  if (!text) { toast('Not boş olamaz'); return; }
  _noteBusy = true;
  closeNoteModal();
  pushItem({ type:'note', text, ts:new Date().toLocaleString('tr-TR') });
  toast('Not kaydedildi ✓');
  setTimeout(() => { _noteBusy = false; }, 400);
}

document.getElementById('btnNote').addEventListener('click', openNoteModal);
document.getElementById('btnNoteOk').addEventListener('click', saveNote);
document.getElementById('btnNoteCancel').addEventListener('click', closeNoteModal);
document.getElementById('noteModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeNoteModal(); });

/* ─── ZIP ─── */
document.getElementById('btnZip').addEventListener('click', doZip);
async function doZip() {
  const c = getCust();
  if (totalMedia(c)===0) { toast('Önce dosya ekleyin'); return; }
  toast('ZIP hazırlanıyor...');
  try {
    const zip = new JSZip();
    const sn  = c.name.replace(/[^\w\u00C0-\u024F\s\-]/g,'_');
    const root = zip.folder(sn);
    let sum = `ÖNCÜ RAPOR\nMüşteri: ${c.name}\nTarih: ${new Date().toLocaleDateString('tr-TR')}\nSaat: ${new Date().toLocaleTimeString('tr-TR')}\n`;
    for (const [,f] of Object.entries(c.folders||{})) {
      const items=f.items||[]; if (!items.length) continue;
      const zf=root.folder(f.name.replace(/[^\w\u00C0-\u024F\s\-]/g,'_'));
      sum+=`\n[ ${f.name} ] — ${items.length} dosya\n`;
      let pi=1,vi=1,ai=1,notes='';
      for (const m of items) {
        const b64 = m.data?m.data.split(',')[1]:null;
        if (m.type==='photo') { const e=m.data.startsWith('data:image/png')?'png':'jpg'; zf.file(`foto_${String(pi).padStart(2,'0')}.${e}`,b64,{base64:true}); sum+=`  - foto_${String(pi++).padStart(2,'0')}.${e}\n`; }
        else if (m.type==='video') { zf.file(`video_${String(vi).padStart(2,'0')}.mp4`,b64,{base64:true}); sum+=`  - video_${String(vi++).padStart(2,'0')}.mp4\n`; }
        else if (m.type==='audio') { const e=m.name.endsWith('m4a')?'m4a':'webm'; zf.file(`ses_${String(ai).padStart(2,'0')}.${e}`,b64,{base64:true}); sum+=`  - ses_${String(ai++).padStart(2,'0')}.${e} (${m.dur||''})\n`; }
        else if (m.type==='note') { notes+=`[${m.ts||''}]\n${m.text}\n\n`; sum+=`  - Not: "${m.text.slice(0,40)}"\n`; }
      }
      if (notes) zf.file('notlar.txt',notes);
    }
    root.file('rapor_ozeti.txt',sum);
    const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=`${sn}_${new Date().toISOString().slice(0,10)}.zip`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    toast('ZIP indirildi ✓');
  } catch(e) { toast('Hata: '+e.message); }
}
